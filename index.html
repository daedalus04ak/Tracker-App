<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="manifest.json">

    <title>Tracker App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #f3f4f6;
            --surface-color: rgba(255, 255, 255, 0.85);
            --surface-border: rgba(255, 255, 255, 0.4);
            --text-color: #1f2937;
            --text-muted: #6b7280;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --color-completed: #10b981;
            --color-partial: #f59e0b;
            --color-missed: #ef4444;
            --color-pending: #9ca3af;
            --nav-bg: rgba(255, 255, 255, 0.6);
            --nav-active: #ffffff;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            --backdrop-filter: blur(16px);
        }

        [data-theme="dark"] {
            --bg-color: #111827;
            --surface-color: rgba(31, 41, 55, 0.85);
            --surface-border: rgba(55, 65, 81, 0.4);
            --text-color: #f9fafb;
            --text-muted: #9ca3af;
            --primary: #6366f1;
            --primary-hover: #818cf8;
            --nav-bg: rgba(31, 41, 55, 0.6);
            --nav-active: #374151;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.4s ease, color 0.4s ease;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .header-top {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            width: 100%;
        }

        #theme-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            font-style: normal;
            min-width: 80px;
        }

        .theme-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .theme-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--surface-border);
            border: 1px solid var(--text-muted);
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: var(--text-color);
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--nav-active);
            border-color: var(--primary);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
            background-color: var(--primary);
        }

        .card {
            background: var(--surface-color);
            backdrop-filter: var(--backdrop-filter);
            -webkit-backdrop-filter: var(--backdrop-filter);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            padding: 24px;
            box-shadow: var(--shadow);
            transition: all 0.4s ease;
            margin-bottom: 24px;
        }

        .main-tabs, .sub-tabs {
            display: flex;
            background: var(--nav-bg);
            backdrop-filter: var(--backdrop-filter);
            -webkit-backdrop-filter: var(--backdrop-filter);
            border: 1px solid var(--surface-border);
            border-radius: 12px;
            padding: 6px;
            margin-bottom: 24px;
            gap: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .tab-btn, .sub-tab-btn {
            flex: 1;
            padding: 12px 16px;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active, .sub-tab-btn.active {
            background: var(--nav-active);
            color: var(--primary);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .view, .sub-view {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .view.active, .sub-view.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .task-header h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
        }

        input[type="date"], select {
            padding: 10px 14px;
            border: 1px solid var(--surface-border);
            border-radius: 8px;
            background: var(--nav-bg);
            color: var(--text-color);
            font-size: 16px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s ease;
            cursor: pointer;
        }

        input[type="date"]:focus, select:focus {
            border-color: var(--primary);
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--nav-bg);
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--surface-border);
            transition: all 0.3s ease;
        }

        .task-item:focus-within {
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15);
        }

        .task-number {
            font-weight: 600;
            color: var(--text-muted);
            min-width: 24px;
        }

        .task-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 16px;
            font-family: inherit;
            outline: none;
        }

        .task-input::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }

        .task-status {
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .status-pending { background: transparent; color: var(--color-pending); border: 1px dashed var(--color-pending); }
        .status-completed { background: rgba(16, 185, 129, 0.15); color: var(--color-completed); border: 1px solid rgba(16, 185, 129, 0.3);}
        .status-partial { background: rgba(245, 158, 11, 0.15); color: var(--color-partial); border: 1px solid rgba(245, 158, 11, 0.3);}
        .status-missed { background: rgba(239, 68, 68, 0.15); color: var(--color-missed); border: 1px solid rgba(239, 68, 68, 0.3);}

        .delete-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: var(--color-missed);
        }

        .add-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 48px;
            height: 48px;
            border-radius: 24px;
            background: var(--primary);
            color: white;
            font-size: 28px;
            font-weight: 300;
            border: none;
            cursor: pointer;
            margin: 12px auto 0;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
            transition: transform 0.2s ease, background 0.3s ease;
        }

        .add-btn:hover {
            transform: scale(1.05) translateY(-2px);
            background: var(--primary-hover);
        }

        .add-btn:active {
            transform: scale(0.95);
        }

        .chart-controls {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 16px;
        }

        .chart-container {
            width: 100%;
            height: 350px;
            position: relative;
        }
        
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 20px 0;
            font-style: italic;
        }
        
        @media (max-width: 600px) {
            .task-item {
                flex-wrap: wrap;
            }
            .task-number {
                display: none;
            }
            .task-input {
                width: 100%;
                min-width: 100%;
                margin-bottom: 8px;
            }
            .task-status {
                flex: 1;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header-top">
            <em id="theme-label">Minimalist</em>
            <label class="theme-switch" for="theme-toggle">
                <input type="checkbox" id="theme-toggle" />
                <div class="slider"></div>
            </label>
        </div>

        <nav class="main-tabs">
            <button class="tab-btn active" data-target="task-view">Task</button>
            <button class="tab-btn" data-target="progress-view">Progress Bar</button>
        </nav>

        <section id="task-view" class="view active card">
            <div class="task-header">
                <h2>Task Today</h2>
                <input type="date" id="date-picker">
            </div>
            
            <div class="task-list" id="task-list">
                <!-- Tasks injected here -->
            </div>
            <button class="add-btn" id="add-task-btn" title="Add new task">+</button>
        </section>

        <section id="progress-view" class="view card">
            <nav class="sub-tabs">
                <button class="sub-tab-btn active" data-target="today-chart">Today</button>
                <button class="sub-tab-btn" data-target="analysis-chart">Analysis</button>
            </nav>

            <div id="today-chart" class="sub-view active">
                <div class="chart-container">
                     <canvas id="barChart"></canvas>
                </div>
            </div>

            <div id="analysis-chart" class="sub-view">
                 <div class="chart-controls">
                     <select id="analysis-range">
                         <option value="week">Past Week</option>
                         <option value="month">Past Month</option>
                         <option value="year">Past Year</option>
                     </select>
                 </div>
                 <div class="chart-container">
                     <canvas id="lineChart"></canvas>
                 </div>
            </div>
        </section>
    </div>

    <script>
        // DOM Elements
        const datePicker = document.getElementById('date-picker');
        const taskListEl = document.getElementById('task-list');
        const addTaskBtn = document.getElementById('add-task-btn');
        const themeToggle = document.getElementById('theme-toggle');
        const themeLabel = document.getElementById('theme-label');

        // Theme Management
        let currentTheme = localStorage.getItem('theme') || 'light';
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggle.checked = true;
            themeLabel.textContent = 'Dark Mode';
        }

        themeToggle.addEventListener('change', (e) => {
            if(e.target.checked) {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeLabel.textContent = 'Dark Mode';
            } else {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                themeLabel.textContent = 'Minimalist';
            }
            renderCharts(); // Re-render to update chart colors
        });

        // Data Management (Wiping old data as per Option B)
        localStorage.removeItem('trackerTasks');
        localStorage.removeItem('trackerStats');
        
        let data = JSON.parse(localStorage.getItem('trackerDataV2')) || {};

        function getLocalDateString(date) {
            const offset = date.getTimezoneOffset()
            const localDate = new Date(date.getTime() - (offset*60*1000))
            return localDate.toISOString().split('T')[0]
        }

        let currentDate = getLocalDateString(new Date());
        datePicker.value = currentDate;

        function saveData() {
            localStorage.setItem('trackerDataV2', JSON.stringify(data));
        }

        // Event Listeners for Date and Navigation
        datePicker.addEventListener('change', (e) => {
            currentDate = e.target.value;
            renderTasks();
            updateTaskHeader();
            if (document.querySelector('.tab-btn[data-target="progress-view"]').classList.contains('active')) {
                renderCharts();
            }
        });
        
        function updateTaskHeader() {
            const header = document.querySelector('.task-header h2');
            const todayStr = getLocalDateString(new Date());
            if (currentDate === todayStr) {
                header.textContent = 'Task Today';
            } else {
                const dateObj = new Date(currentDate + "T00:00:00");
                header.textContent = 'Tasks: ' + dateObj.toLocaleDateString(undefined, {month: 'short', day: 'numeric', year: 'numeric'});
            }
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.target).classList.add('active');
                if (btn.dataset.target === 'progress-view') {
                    renderCharts();
                }
            });
        });

        document.querySelectorAll('.sub-tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.sub-view').forEach(v => v.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.target).classList.add('active');
                renderCharts();
            });
        });

        document.getElementById('analysis-range').addEventListener('change', renderCharts);

        // Task Rendering & Logic
        function renderTasks() {
            taskListEl.innerHTML = '';
            const tasks = data[currentDate] || [];
            
            if (tasks.length === 0) {
                taskListEl.innerHTML = '<div class="empty-state">No tasks for this date. Click + below to add one.</div>';
                return;
            }
            
            tasks.forEach((task, index) => {
                const item = document.createElement('div');
                item.className = 'task-item';
                item.innerHTML = `
                    <span class="task-number">${index + 1}.</span>
                    <input type="text" class="task-input" value="${task.text}" placeholder="What's the objective?" oninput="updateTask(${index}, this.value, null)">
                    <select class="task-status status-${task.status}" onchange="updateTask(${index}, null, this.value)">
                        <option value="pending" ${task.status === 'pending' ? 'selected' : ''}>Pending</option>
                        <option value="completed" ${task.status === 'completed' ? 'selected' : ''}>Completed</option>
                        <option value="partial" ${task.status === 'partial' ? 'selected' : ''}>Partially Completed</option>
                        <option value="missed" ${task.status === 'missed' ? 'selected' : ''}>Missed</option>
                    </select>
                    <button class="delete-btn" onclick="deleteTask(${index})" title="Delete task">×</button>
                `;
                taskListEl.appendChild(item);
            });
        }

        addTaskBtn.addEventListener('click', () => {
            if(!data[currentDate]) data[currentDate] = [];
            data[currentDate].push({text: '', status: 'pending'});
            saveData();
            renderTasks();
            setTimeout(() => {
                const inputs = taskListEl.querySelectorAll('.task-input');
                if(inputs.length > 0) inputs[inputs.length - 1].focus();
            }, 50);
        });

        window.updateTask = function(index, text, status) {
            if(text !== null) data[currentDate][index].text = text;
            if(status !== null) {
                data[currentDate][index].status = status;
                renderTasks(); 
            }
            saveData();
        }

        window.deleteTask = function(index) {
            data[currentDate].splice(index, 1);
            if (data[currentDate].length === 0) {
                delete data[currentDate];
            }
            saveData();
            renderTasks();
        }

        // Charts Rendering & Logic
        let barChartInstance = null;
        let lineChartInstance = null;

        function getChartColors() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const textColor = isDark ? '#f9fafb' : '#1f2937';
            const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
            return { textColor, gridColor };
        }

        function renderCharts() {
            const { textColor, gridColor } = getChartColors();
            Chart.defaults.font.family = "'Inter', sans-serif";
            
            const commonOptions = {
                responsive: true,
                maintainAspectRatio: false,
                color: textColor,
                scales: {
                    x: { ticks: { color: textColor }, grid: { display: false } },
                    y: { 
                        ticks: { color: textColor, stepSize: 1 }, 
                        grid: { color: gridColor, borderDash: [5, 5] }, 
                        beginAtZero: true 
                    }
                },
                plugins: { 
                    legend: { labels: { color: textColor, font: { weight: '500' } } } 
                }
            };

            // Bar Chart (Today/Selected Date)
            if (document.getElementById('today-chart').classList.contains('active')) {
                const tasks = data[currentDate] || [];
                let completed = 0, partial = 0, missed = 0;
                tasks.forEach(t => {
                    if(t.status === 'completed') completed++;
                    else if(t.status === 'partial') partial++;
                    else if(t.status === 'missed') missed++;
                });
                const total = tasks.length;

                const ctxBar = document.getElementById('barChart').getContext('2d');
                if(barChartInstance) barChartInstance.destroy();
                
                // Add a small delay for animation readiness
                barChartInstance = new Chart(ctxBar, {
                    type: 'bar',
                    data: {
                        labels: ['Total Tasks', 'Completed', 'Partial', 'Missed'],
                        datasets: [{
                            label: `Task Status on ${currentDate}`,
                            data: [total, completed, partial, missed],
                            backgroundColor: [
                                '#6366f1', // Primary
                                '#10b981', // Completed
                                '#f59e0b', // Partial
                                '#ef4444'  // Missed
                            ],
                            borderRadius: 8,
                            borderSkipped: false,
                            barPercentage: 0.6
                        }]
                    },
                    options: {
                        ...commonOptions,
                        plugins: { legend: { display: false } },
                        animation: {
                            y: { duration: 1000, easing: 'easeOutQuart' }
                        }
                    }
                });
            }

            // Line Chart (Analysis)
            if (document.getElementById('analysis-chart').classList.contains('active')) {
                const range = document.getElementById('analysis-range').value;
                const ctxLine = document.getElementById('lineChart').getContext('2d');
                
                const days = range === 'week' ? 7 : (range === 'month' ? 30 : 365);
                const labels = [];
                const datasetsData = { completed: [], partial: [], missed: [] };
                
                // Construct labels and data array going backwards from selected currentDate
                const anchorDate = new Date(currentDate + "T00:00:00");
                for(let i = days - 1; i >= 0; i--) {
                    const d = new Date(anchorDate);
                    d.setDate(anchorDate.getDate() - i);
                    const dStr = getLocalDateString(d);
                    
                    if (range === 'year') {
                        if (d.getDate() === 1) { // Only show months for year view
                            labels.push(d.toLocaleDateString(undefined, {month: 'short', year: '2-digit'}));
                        } else {
                            labels.push('');
                        }
                    } else {
                        labels.push(d.toLocaleDateString(undefined, {month: 'short', day: 'numeric'}));
                    }
                    
                    const tasksDay = data[dStr] || [];
                    let c = 0, p = 0, m = 0;
                    tasksDay.forEach(t => {
                        if(t.status === 'completed') c++;
                        else if(t.status === 'partial') p++;
                        else if(t.status === 'missed') m++;
                    });
                    datasetsData.completed.push(c);
                    datasetsData.partial.push(p);
                    datasetsData.missed.push(m);
                }

                if(lineChartInstance) lineChartInstance.destroy();
                lineChartInstance = new Chart(ctxLine, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            { 
                                label: 'Completed', 
                                data: datasetsData.completed, 
                                borderColor: '#10b981', 
                                backgroundColor: 'rgba(16, 185, 129, 0.1)', 
                                fill: true,
                                tension: 0.4,
                                pointRadius: range === 'year' ? 0 : 3
                            },
                            { 
                                label: 'Partial', 
                                data: datasetsData.partial, 
                                borderColor: '#f59e0b', 
                                backgroundColor: 'rgba(245, 158, 11, 0.1)',
                                fill: true,
                                tension: 0.4,
                                pointRadius: range === 'year' ? 0 : 3
                            },
                            { 
                                label: 'Missed', 
                                data: datasetsData.missed, 
                                borderColor: '#ef4444', 
                                backgroundColor: 'rgba(239, 68, 68, 0.1)',
                                fill: true,
                                tension: 0.4,
                                pointRadius: range === 'year' ? 0 : 3
                            },
                        ]
                    },
                    options: {
                        ...commonOptions,
                        interaction: {
                            mode: 'index',
                            intersect: false,
                        },
                        scales: {
                            ...commonOptions.scales,
                            x: {
                                ...commonOptions.scales.x,
                                ticks: {
                                    ...commonOptions.scales.x.ticks,
                                    autoSkip: true,
                                    maxTicksLimit: range === 'year' ? 12 : (range === 'month' ? 10 : 7)
                                }
                            }
                        }
                    }
                });
            }
        }

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
        }

        // Init
        updateTaskHeader();
        renderTasks();

    </script>
</body>

</html>
