<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <link rel="manifest" href="manifest.json?v=4">
    <link rel="icon" type="image/png" sizes="512x512" href="icon.png?v=4">
    <link rel="icon" type="image/svg+xml" href="icon.svg?v=4">
    <link rel="apple-touch-icon" sizes="512x512" href="icon.png?v=4">

    <title>Tracker App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --surface-border: #e2e8f0;
            --text-color: #334155;
            --text-muted: #64748b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --color-completed: #10b981;
            --color-partial: #f59e0b;
            --color-missed: #ef4444;
            --color-pending: #94a3b8;
            --nav-bg: rgba(248, 250, 252, 0.8);
            --nav-active: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --backdrop-filter: blur(12px);
        }

        [data-theme="dark"] {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --surface-border: #334155;
            --text-color: #e2e8f0;
            --text-muted: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --nav-bg: rgba(15, 23, 42, 0.9);
            --nav-active: #1e293b;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.2);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            transition: background-color 0.4s cubic-bezier(0.4, 0, 0.2, 1), color 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            width: 100%;
        }

        #theme-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
            font-style: normal;
            min-width: 80px;
        }

        .theme-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
            flex-shrink: 0;
        }

        .theme-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--surface-border);
            border: 1px solid var(--text-muted);
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: var(--text-color);
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--nav-active);
            border-color: var(--primary);
        }

        input:checked+.slider:before {
            transform: translateX(24px);
            background-color: var(--primary);
        }

        .card {
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border: none;
            border-radius: 0;
            padding: 16px 0;
            box-shadow: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-bottom: 24px;
        }

        .main-tabs,
        .sub-tabs {
            display: flex;
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border: none;
            border-bottom: 1px solid var(--surface-border);
            border-radius: 0;
            padding: 0;
            margin-bottom: 24px;
            gap: 16px;
            box-shadow: none;
            overflow-x: auto;
        }

        .tab-btn,
        .sub-tab-btn {
            flex: 0 0 auto;
            padding: 12px 16px;
            border: none;
            background: transparent;
            border-radius: 0;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
        }

        .tab-btn.active,
        .sub-tab-btn.active {
            background: transparent;
            color: var(--primary);
            box-shadow: none;
            border-bottom: 2px solid var(--primary);
        }

        .view,
        .sub-view {
            display: none;
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .view.active,
        .sub-view.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideFadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .task-header h2 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
        }

        input[type="date"],
        select {
            padding: 6px 10px;
            border: 1px solid transparent;
            border-radius: 6px;
            background: transparent;
            color: var(--text-color);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.3s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
        }

        input[type="date"]:hover,
        select:hover {
            background: var(--nav-bg);
            border-color: var(--surface-border);
        }

        input[type="date"]:focus,
        select:focus {
            border-color: var(--primary);
            box-shadow: none;
            background: var(--surface-color);
        }

        /* Hide native date picker */
        input[type="date"]::-webkit-calendar-picker-indicator {
            opacity: 0;
            position: absolute;
            right: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        input[type="date"] {
            position: relative;
        }

        /* Custom Date Picker */
        .cdp-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s ease, visibility 0.25s ease;
            backdrop-filter: blur(4px);
        }

        .cdp-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        .cdp-calendar {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            padding: 24px;
            width: 320px;
            max-width: 90vw;
            animation: cdp-pop 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Inter', sans-serif;
        }

        @keyframes cdp-pop {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .cdp-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .cdp-header button {
            background: var(--nav-bg);
            border: 1px solid var(--surface-border);
            border-radius: 10px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-color);
            font-size: 16px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cdp-header button:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .cdp-month-year {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-color);
            text-align: center;
        }

        .cdp-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            margin-bottom: 6px;
        }

        .cdp-weekdays span {
            text-align: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            padding: 6px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cdp-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
        }

        .cdp-day {
            text-align: center;
            padding: 0;
            width: 38px;
            height: 38px;
            line-height: 38px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text-color);
            border: none;
            background: transparent;
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            margin: 0 auto;
        }

        .cdp-day:hover {
            background: rgba(99, 102, 241, 0.12);
        }

        .cdp-day.today {
            border: 2px solid var(--primary);
            font-weight: 700;
        }

        .cdp-day.selected {
            background: var(--primary);
            color: white;
            font-weight: 700;
        }

        .cdp-day.other-month {
            color: var(--text-muted);
            opacity: 0.4;
        }

        .cdp-today-btn {
            display: block;
            width: 100%;
            margin-top: 14px;
            padding: 10px;
            border: none;
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary);
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .cdp-today-btn:hover {
            background: var(--primary);
            color: white;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 0;
            margin-bottom: 0;
            border-top: 1px solid var(--surface-border);
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            padding: 8px 4px;
            border: none;
            border-bottom: 1px solid var(--surface-border);
            border-radius: 0;
            transition: background-color 0.2s;
            position: relative;
        }

        .task-item:focus-within {
            background: var(--nav-bg);
            border-color: var(--surface-border);
        }

        .task-number {
            display: none;
        }

        .task-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 15px;
            font-family: inherit;
            outline: none;
            padding: 4px;
        }

        .task-input::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }

        .task-status {
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 500;
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 12px;
            transition: opacity 0.2s;
            appearance: none;
            text-align: center;
        }

        .task-status:hover {
            opacity: 0.8;
        }

        .status-pending {
            background: transparent;
            color: var(--color-pending);
            border: 1px solid var(--surface-border);
        }

        .status-completed {
            background: rgba(16, 185, 129, 0.1);
            color: var(--color-completed);
        }

        .status-partial {
            background: rgba(245, 158, 11, 0.1);
            color: var(--color-partial);
        }

        .status-missed {
            background: rgba(239, 68, 68, 0.1);
            color: var(--color-missed);
        }

        .task-project {
            border-radius: 4px;
            padding: 4px 6px;
            font-size: 12px;
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid transparent;
            max-width: 100px;
            outline: none;
            cursor: pointer;
            appearance: none;
            transition: all 0.2s;
            font-weight: 500;
        }

        .task-project:hover, .task-project:focus {
            background-color: var(--nav-bg);
            border-color: var(--surface-border);
            color: var(--text-color);
        }

        .task-project option {
            background-color: var(--bg-color);
            color: var(--text-color);
        }

        .delete-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
        }

        .task-item:hover .delete-btn,
        .task-item:focus-within .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: var(--color-missed);
        }

        .add-btn {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            width: 100%;
            padding: 12px 8px;
            background: transparent;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            border: none;
            cursor: pointer;
            margin: 0;
            margin-bottom: 24px;
            transition: color 0.2s, background 0.2s;
            border-bottom: 1px solid var(--surface-border);
        }

        .add-btn::before {
            content: '+';
            margin-right: 12px;
            font-size: 18px;
            font-weight: 400;
        }

        .add-btn:hover {
            color: var(--primary);
            background: var(--nav-bg);
        }

        .add-btn:active {
            opacity: 0.8;
        }

        .chart-controls {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 16px;
        }

        .chart-container {
            width: 100%;
            height: 350px;
            position: relative;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 20px 0;
            font-style: italic;
        }

        /* Weekly View Styles */
        .weekly-range-picker {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .weekly-range-picker label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .weekly-day-card {
            background: var(--nav-bg);
            border: 1px solid var(--surface-border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .weekly-day-card:hover {
            border-color: var(--primary);
            box-shadow: 0 2px 12px rgba(79, 70, 229, 0.08);
        }

        .weekly-day-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--surface-border);
        }

        .weekly-day-title {
            font-weight: 700;
            font-size: 16px;
            color: var(--primary);
        }

        .weekly-day-title.is-today {
            color: var(--color-completed);
        }

        /* Projects CSS */
        .project-card {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--surface-border);
            border-radius: 0;
            padding: 12px 0;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .project-card:last-child {
            border-bottom: none;
        }
        .project-card:hover {
            border-color: var(--primary);
            background: var(--nav-bg);
            padding-left: 8px;
            padding-right: 8px;
            margin-left: -8px;
            margin-right: -8px;
        }
        .project-card-title {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-color);
            margin-bottom: 4px;
        }
        .project-card-stats {
            font-size: 13px;
            color: var(--text-muted);
        }
        .project-section {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--surface-border);
            border-radius: 0;
            padding: 16px 0;
        }
        .project-section:last-child {
            border-bottom: none;
        }
        .attachment-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            background: rgba(0,0,0,0.05);
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-color);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        [data-theme="dark"] .attachment-item {
            background: rgba(255,255,255,0.05);
        }
        .attachment-item a {
            color: var(--primary);
            text-decoration: none;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: inline-block;
            max-width: 80%;
        }
        .attachment-item a:hover {
            text-decoration: underline;
        }

        .weekly-day-stats {
            display: flex;
            gap: 10px;
            font-size: 12px;
            font-weight: 600;
        }

        .weekly-day-stats .stat-chip {
            padding: 2px 8px;
            border-radius: 20px;
            line-height: 1.5;
        }

        .weekly-day-stats .stat-completed {
            background: rgba(16, 185, 129, 0.15);
            color: var(--color-completed);
        }

        .weekly-day-stats .stat-partial {
            background: rgba(245, 158, 11, 0.15);
            color: var(--color-partial);
        }

        .weekly-day-stats .stat-missed {
            background: rgba(239, 68, 68, 0.15);
            color: var(--color-missed);
        }

        .weekly-task-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 0;
        }

        .weekly-task-text {
            flex: 1;
            font-size: 14px;
            color: var(--text-color);
        }

        .weekly-task-badge {
            font-size: 12px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            text-transform: capitalize;
        }

        .weekly-no-tasks {
            font-size: 13px;
            color: var(--text-muted);
            font-style: italic;
            padding: 4px 0;
        }

        /* ===== RESPONSIVE BREAKPOINTS ===== */

        /* Large desktop */
        @media (min-width: 1200px) {
            .container {
                max-width: 900px;
            }

            body {
                padding: 32px;
            }
        }

        /* Tablet landscape / small desktop */
        @media (max-width: 1024px) {
            .container {
                max-width: 720px;
            }
        }

        /* Tablet portrait / iPad */
        @media (max-width: 768px) {
            body {
                padding: 16px;
            }

            .card {
                padding: 12px 0;
                border-radius: 0;
            }

            .task-header h2 {
                font-size: 20px;
            }

            .tab-btn,
            .sub-tab-btn {
                padding: 10px 12px;
                font-size: 14px;
            }

            .chart-container {
                height: 280px;
            }
        }

        /* Mobile phones */
        @media (max-width: 600px) {
            body {
                padding: 12px;
            }

            .header-top {
                margin-bottom: 16px;
                flex-wrap: wrap;
                gap: 12px;
            }

            #theme-label {
                display: none;
            }

            .app-logo {
                font-size: 20px !important;
            }

            .card {
                padding: 8px 0;
                border-radius: 0;
            }

            .main-tabs,
            .sub-tabs {
                border-radius: 0;
                padding: 0;
                gap: 8px;
                margin-bottom: 16px;
            }

            .tab-btn,
            .sub-tab-btn {
                padding: 10px 8px;
                font-size: 13px;
            }

            .task-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .task-header h2 {
                font-size: 18px;
            }

            .task-item {
                flex-wrap: wrap;
                padding: 10px 8px;
                gap: 6px;
            }

            .task-number {
                display: none;
            }

            .task-input {
                width: calc(100% - 30px);
                min-width: 0;
                flex: 1 1 100%;
                margin-bottom: 4px;
                padding: 4px 0;
            }

            .task-status {
                flex: 0 0 auto;
                font-size: 12px;
                padding: 4px 8px;
            }

            .task-project {
                text-align: left;
            }

            .delete-btn {
                font-size: 18px;
                opacity: 1;
                position: absolute;
                right: 8px;
                top: 10px;
            }

            .weekly-range-picker {
                flex-direction: column;
                align-items: flex-start;
                width: 100%;
            }

            .weekly-range-picker input[type="date"] {
                width: 100%;
            }

            input[type="date"],
            select {
                font-size: 14px;
                padding: 8px 10px;
            }

            .chart-container {
                height: 240px;
            }

            /* removed old .add-btn mobile width/height */

            .auth-card {
                padding: 24px 20px;
                margin: 12px;
            }
        }

        /* Small phones (iPhone SE, etc.) */
        @media (max-width: 375px) {
            body {
                padding: 8px;
            }

            .tab-btn,
            .sub-tab-btn {
                padding: 8px 6px;
                font-size: 12px;
            }

            .card {
                padding: 12px;
            }

            .chart-container {
                height: 200px;
            }
        }

        /* Safe area for notched phones (iPhone X+) */
        @supports (padding: env(safe-area-inset-bottom)) {
            body {
                padding-left: max(12px, env(safe-area-inset-left));
                padding-right: max(12px, env(safe-area-inset-right));
                padding-bottom: max(12px, env(safe-area-inset-bottom));
            }
        }

        /* Touch-friendly sizing for mobile */
        @media (hover: none) and (pointer: coarse) {
            .tab-btn,
            .sub-tab-btn {
                min-height: 44px;
            }

            .task-status,
            select {
                min-height: 40px;
            }

            .delete-btn {
                min-width: 40px;
                min-height: 40px;
            }
        }

        /* Authentication UI */
        .auth-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .auth-overlay.hidden {
            display: none;
        }

        .auth-card {
            background: var(--surface-bg);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            margin: 16px;
        }

        .auth-card h2 {
            margin-bottom: 24px;
            color: var(--text-color);
        }

        .auth-input {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 16px;
            border: 1px solid var(--surface-border);
            border-radius: 8px;
            background: var(--nav-bg);
            color: var(--text-color);
            font-size: 16px;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Inter', sans-serif;
        }

        .auth-btn:hover {
            opacity: 0.9;
        }

        .auth-toggle {
            margin-top: 16px;
            color: var(--text-muted);
            font-size: 14px;
            cursor: pointer;
        }

        .auth-toggle span {
            color: var(--primary);
            font-weight: 600;
        }

        .auth-error {
            color: var(--color-missed);
            font-size: 14px;
            margin-bottom: 16px;
            min-height: 20px;
            display: none;
        }

        .signout-btn {
            background: transparent;
            border: 1px solid var(--surface-border);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Inter', sans-serif;
            display: none;
        }

        .signout-btn:hover {
            color: var(--color-missed);
            border-color: var(--color-missed);
        }

        .google-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            color: var(--text-color);
            border: 1px solid var(--surface-border);
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
        }

        .google-btn:hover {
            background: var(--surface-border);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 16px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--surface-border);
        }

        .divider:not(:empty)::before {
            margin-right: .5em;
        }

        .divider:not(:empty)::after {
            margin-left: .5em;
        }
    </style>
</head>

            <div style="display: flex; align-items: center; gap: 12px;">

        <section id="task-view" class="view active card">

        <!-- PROJECTS VIEW -->
        <section id="projects-view" class="view card">
            
            <!-- List state -->
            <div id="projects-list-container">
                <div class="task-header" style="margin-bottom: 24px;">
                    <h2>Projects</h2>
                    <div id="new-project-toggle">
                        <button onclick="document.getElementById('new-project-form').style.display='flex'; this.style.display='none'; setTimeout(()=>document.getElementById('new-project-input').focus(), 10);" style="padding:8px 16px;border:none;background:var(--primary);color:white;border-radius:8px;font-weight:600;cursor:pointer;font-size:14px;transition:all 0.2s cubic-bezier(0.4, 0, 0.2, 1);">+ New Project</button>
                    </div>
                </div>
                <div id="new-project-form" style="display:none; align-items:center; gap:8px; margin-bottom: 24px; padding:16px; background:var(--surface-color); border:1px solid var(--surface-border); border-radius:12px; animation: slideFadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;">
                    <input type="text" id="new-project-input" placeholder="Project name..." style="flex:1; padding:10px 12px;border:1px solid var(--surface-border);background:var(--bg-color);color:var(--text-color);border-radius:8px;font-size:14px;outline:none;" />
                    <button id="create-project-btn" style="padding:10px 20px;border:none;background:var(--primary);color:white;border-radius:8px;font-weight:600;cursor:pointer;font-size:14px;transition:all 0.2s cubic-bezier(0.4, 0, 0.2, 1);">Add</button>
                    <button onclick="document.getElementById('new-project-form').style.display='none'; document.getElementById('new-project-toggle').children[0].style.display='block';" style="padding:8px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:20px;">&times;</button>
                </div>
                <div id="projects-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 16px;">
                    <!-- Project Cards -->
                </div>
            </div>

            <!-- Detail state -->
            <div id="project-detail-container" style="display: none;">
                <div class="task-header" style="margin-bottom: 24px;">
                    <div style="display: flex; align-items: center; gap: 12px; flex: 1;">
                        <button id="project-back-btn" style="background:transparent;border:none;color:var(--text-color);font-size:24px;cursor:pointer;line-height:1;padding:0 8px;">&larr;</button>
                        <h2 id="project-detail-title" style="margin:0; cursor:pointer; transition:color 0.2s;" title="Click to rename" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color=''">Project Title</h2>
                        <input type="text" id="project-rename-input" style="display:none; font-size:24px; font-weight:700; border:none; background:transparent; border-bottom:2px solid var(--primary); color:var(--text-color); outline:none; margin:0; padding:0; width:100%; max-width:300px; font-family:inherit;">
                    </div>
                    <button id="delete-project-btn" style="padding:6px 14px;border:1px solid var(--color-missed);background:transparent;color:var(--color-missed);border-radius:8px;font-weight:600;cursor:pointer;font-size:13px;transition:all 0.2s;">Delete</button>
                </div>

                <div style="display: flex; gap: 16px; margin-bottom: 24px; align-items: center; flex-wrap: wrap;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <label style="color:var(--text-muted); font-size:14px; font-weight:500;">Start Date:</label>
                        <input type="date" id="project-start-date">
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <label style="color:var(--text-muted); font-size:14px; font-weight:500;">End Date:</label>
                        <input type="date" id="project-end-date">
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <label style="color:var(--text-muted); font-size:14px; font-weight:500;">Status:</label>
                        <select id="project-global-status" style="padding: 6px 12px; font-weight: 600;">
                            <option value="pending" style="color: var(--color-pending);">Pending</option>
                            <option value="partial" style="color: var(--color-partial);">Partial</option>
                            <option value="completed" style="color: var(--color-completed);">Completed</option>
                            <option value="missed" style="color: var(--color-missed);">Missed</option>
                        </select>
                    </div>
                </div>

                <div class="project-workspace" style="display: grid; grid-template-columns: 1fr; gap: 24px;">
                    
                    <div class="project-section">
                        <h3 style="font-size: 16px; color: var(--primary); margin-top:0; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between;">
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>

                        <h3 style="font-size: 16px; color: var(--primary); margin-top:0; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between;">
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"></path><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                                Checklist
                            </div>

                            </div>
                        </h3>
                        <div id="new-task-form" style="display:none; align-items:center; gap:8px; margin-bottom: 16px; animation: slideFadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;">
                            <input type="text" id="new-task-input" placeholder="New task title..." style="flex:1; padding:10px 12px;border:1px solid var(--surface-border);background:var(--bg-color);color:var(--text-color);border-radius:8px;font-size:14px;outline:none;">

                            <button onclick="document.getElementById('new-task-form').style.display='none'; document.getElementById('new-task-toggle').children[0].style.display='block';" style="padding:8px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:20px;">&times;</button>
                        </div>
                        <div id="project-task-list" class="task-list" style="margin-bottom: 0;"></div>

                    <div class="project-section">
                        <h3 style="font-size: 16px; color: var(--primary); margin-top:0; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between;">
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>

                            </div>
                            <div id="new-file-toggle">
                                <button onclick="document.getElementById('new-file-form').style.display='flex'; this.style.display='block'; setTimeout(()=>document.getElementById('new-file-input').focus(), 10);" style="background:transparent;border:none;color:var(--primary);font-size:24px;cursor:pointer;padding:0;line-height:1;">+</button>
                            </div>
                        </h3>
                        <div id="new-file-form" style="display:none; align-items:center; gap:8px; margin-bottom: 16px; animation: slideFadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;">
                            <input type="url" id="new-file-input" placeholder="HTTPS URL..." style="flex:1; padding:10px 12px;border:1px solid var(--surface-border);background:var(--bg-color);color:var(--text-color);border-radius:8px;font-size:14px;outline:none;">
                            <button id="project-add-file-btn" style="background:var(--primary);border:none;color:white;border-radius:8px;padding:10px 16px;cursor:pointer;font-weight:600;">Add</button>
                            <button onclick="document.getElementById('new-file-form').style.display='none'; document.getElementById('new-file-toggle').children[0].style.display='block';" style="padding:8px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:20px;">&times;</button>
                        </div>
                        <div id="project-files-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="progress-view" class="view card">
            <nav class="sub-tabs">
                <button class="sub-tab-btn active" data-target="today-chart">Today</button>
                <button class="sub-tab-btn" data-target="analysis-chart">Analysis</button>
                <button class="sub-tab-btn" data-target="projects-chart">Projects</button>
            </nav>

            <div id="today-chart" class="sub-view active">
                <div class="chart-container">
                    <canvas id="barChart"></canvas>
                </div>
            </div>

            <div id="projects-chart" class="sub-view">
                <div class="chart-container">
                    <canvas id="projectsBarChart"></canvas>
                </div>
            </div>

            <div id="analysis-chart" class="sub-view">
                <div class="chart-controls">
                    <select id="analysis-range">
                        <option value="week">Past Week</option>
                        <option value="weekly">Weekly (All Ranges)</option>
                        <option value="month">Past Month</option>
                        <option value="year">Past Year</option>
                    </select>
                    <div class="filter-group"
                        style="margin-top: 12px; display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; font-size: 14px; color: var(--text-color);">
                        <label style="display: flex; align-items: center; gap: 4px; cursor: pointer;"><input
                                type="checkbox" id="chk-all" checked> All</label>
                        <label style="display: flex; align-items: center; gap: 4px; cursor: pointer;"><input
                                type="checkbox" id="chk-total" checked> Total</label>
                        <label style="display: flex; align-items: center; gap: 4px; cursor: pointer;"><input
                                type="checkbox" id="chk-comp" checked> Completed</label>
                        <label style="display: flex; align-items: center; gap: 4px; cursor: pointer;"><input
                                type="checkbox" id="chk-part" checked> Partial</label>
                        <label style="display: flex; align-items: center; gap: 4px; cursor: pointer;"><input
                                type="checkbox" id="chk-miss" checked> Missed</label>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="lineChart"></canvas>
                </div>
            </div>
        </section>
    </div>

    <!-- Auth Overlay -->
    <div id="auth-overlay" class="auth-overlay">
        <div class="auth-card">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js";

        // DOM Elements
        const datePicker = document.getElementById('date-picker');
        const taskListEl = document.getElementById('task-list');
        const addTaskBtn = document.getElementById('add-task-btn');
        const themeToggle = document.getElementById('theme-toggle');
        const themeLabel = document.getElementById('theme-label');

        // Theme Management
        let currentTheme = localStorage.getItem('theme') || 'light';
        if (currentTheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggle.checked = true;
            themeLabel.textContent = 'Dark Mode';
        }

        themeToggle.addEventListener('change', (e) => {
            if (e.target.checked) {
                document.documentElement.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                themeLabel.textContent = 'Dark Mode';
            } else {
                document.documentElement.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
                themeLabel.textContent = 'Minimalist';
            }
            if (typeof renderCharts === 'function') renderCharts(); // Re-render to update chart colors
        });

        // Data Management (Wiping old data as per Option B)
        localStorage.removeItem('trackerTasks');
        localStorage.removeItem('trackerStats');

        let data = {};

        // == FIREBASE SYNCHRONIZATION CONFIG ==
        const firebaseConfig = {
            apiKey: "AIzaSyBZh_zrho9kUClsEKyv2WI5IdxcVaO-3NE",
            authDomain: "arjanfire-b46d3.firebaseapp.com",
            projectId: "arjanfire-b46d3",
            storageBucket: "arjanfire-b46d3.firebasestorage.app",
            messagingSenderId: "729470703419",
            appId: "1:729470703419:web:dc64288e6fdeaaa2bbc91e",
            measurementId: "G-XQZR1JFDJG"
        };

        window.db = null;
        window.auth = null;
        let currentUser = null;
        let isFirebaseActive = false;
        let unsubscribeSnapshot = null;

        if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
            const app = initializeApp(firebaseConfig);
            window.db = getFirestore(app);
            window.auth = getAuth(app);
            isFirebaseActive = true;
            console.log("Firebase sync is ACTIVE.");

            onAuthStateChanged(window.auth, (user) => {
                const overlay = document.getElementById('auth-overlay');
                const btnSignout = document.getElementById('signout-btn');

                if (user) {
                    currentUser = user;
                    overlay.classList.add('hidden');
                    btnSignout.style.display = 'block';

                    data = JSON.parse(localStorage.getItem(`trackerDataV3_${currentUser.uid}`)) || {};

                    if (unsubscribeSnapshot) unsubscribeSnapshot();
                    unsubscribeSnapshot = onSnapshot(doc(window.db, "tracker", currentUser.uid), (docSnapshot) => {
                        if (docSnapshot.exists()) {
                            data = docSnapshot.data();
                        } else {
                            data = {};
                        }
                        localStorage.setItem(`trackerDataV3_${currentUser.uid}`, JSON.stringify(data));

                        if (typeof renderTasks === 'function') renderTasks();
                        const pbTab = document.querySelector('.tab-btn[data-target="progress-view"]');
                        if (pbTab && pbTab.classList.contains('active') && typeof renderCharts === 'function') {
                            renderCharts();
                        }
                        const wkTab = document.querySelector('.tab-btn[data-target="weekly-view"]');
                        if (wkTab && wkTab.classList.contains('active')) {
                            // no longer applies
                        }
                    }, (error) => {
                        console.error("Firebase sync error:", error);
                    });
                } else {
                    currentUser = null;
                    if (unsubscribeSnapshot) {
                        unsubscribeSnapshot();
                        unsubscribeSnapshot = null;
                    }
                    data = {};
                    if (typeof renderTasks === 'function') renderTasks();
                    overlay.classList.remove('hidden');
                    btnSignout.style.display = 'none';
                }
            });
        }

        function getLocalDateString(date) {
            const offset = date.getTimezoneOffset()
            const localDate = new Date(date.getTime() - (offset * 60 * 1000))
            return localDate.toISOString().split('T')[0]
        }

        let currentDate = getLocalDateString(new Date());
        datePicker.value = currentDate;

        let activeWeeklyKey = null;

        // Get all weekly keys from data, sorted by start date
        function getAllWeeklyKeys() {
            return Object.keys(data)
                .filter(k => k.startsWith('week_'))
                .sort((a, b) => {
                    const aStart = a.split('_')[1];
                    const bStart = b.split('_')[1];
                    return aStart.localeCompare(bStart);
                });
        }

        function weekKeyToLabel(key) {
            const parts = key.split('_');
            const s = new Date(parts[1] + 'T00:00:00');
            const e = new Date(parts[2] + 'T00:00:00');
            const fmt = { month: 'short', day: 'numeric' };
            return `${s.toLocaleDateString(undefined, { ...fmt, weekday: 'short' })} — ${e.toLocaleDateString(undefined, { ...fmt, weekday: 'short' })}`;
        }



        function saveData() {
            if (currentUser) {
                localStorage.setItem(`trackerDataV3_${currentUser.uid}`, JSON.stringify(data));
                if (isFirebaseActive && window.db) {
                    setDoc(doc(window.db, "tracker", currentUser.uid), data)
                        .catch(e => console.error("Failed to sync to cloud:", e));
                }
            }
        }

        // Event Listeners for Date and Navigation
        datePicker.addEventListener('change', (e) => {
            currentDate = e.target.value;
            renderTasks();
            updateTaskHeader();
            if (document.querySelector('.tab-btn[data-target="progress-view"]').classList.contains('active')) {
                renderCharts();
            }
        });

        function updateTaskHeader() {
            const header = document.querySelector('.task-header h2');
            const todayStr = getLocalDateString(new Date());
            if (currentDate === todayStr) {
                header.textContent = 'Task Today';
            } else {
                const dateObj = new Date(currentDate + "T00:00:00");
                header.textContent = 'Tasks: ' + dateObj.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
            }
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.target).classList.add('active');
                if (btn.dataset.target === 'progress-view') {
                    renderCharts();
                }
                if (btn.dataset.target === 'weekly-view') {
                    // Do nothing
                }
                if (btn.dataset.target === 'projects-view') {
                    if (typeof renderProjectsList === 'function') renderProjectsList();
                }
            });
        });

        document.querySelectorAll('.sub-tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.sub-view').forEach(v => v.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.target).classList.add('active');
                renderCharts();
            });
        });

        document.getElementById('analysis-range').addEventListener('change', () => {
            renderCharts();
        });

        // Task Rendering & Logic
        function renderTasks() {
            const tasks = data[currentDate] || [];

            if (tasks.length === 0) {
                taskListEl.innerHTML = '<div class="empty-state">No tasks for this date. Click + below to add one.</div>';
                return;
            }

            // Soft DOM update to prevent focus loss and typing lag
            const existingItems = taskListEl.querySelectorAll('.task-item');
            if (existingItems.length === tasks.length && existingItems.length > 0) {
                tasks.forEach((task, index) => {
                    const item = existingItems[index];
                    const input = item.querySelector('.task-input');
                    const select = item.querySelector('.task-status');

                    // Don't overwrite the input value if the user is currently typing in it!
                    if (input && document.activeElement !== input && input.value !== task.text) {
                        input.value = task.text;
                    }
                    if (select && select.value !== task.status) {
                        select.value = task.status;
                        select.className = `task-status status-${task.status}`;
                    }
                });
                return; // Early return skips the destructive HTML rebuild
            }

            taskListEl.innerHTML = '';

            tasks.forEach((task, index) => {
                const item = document.createElement('div');
                item.className = 'task-item';
                item.innerHTML = `
                    <span class="task-number">${index + 1}.</span>
                    <input type="text" class="task-input" value="${task.text}" placeholder="What's the objective?" oninput="updateTask(${index}, this.value, null, null)">
                    <select class="task-status status-${task.status}" onchange="updateTask(${index}, null, this.value, null)">
                        <option value="pending" ${task.status === 'pending' ? 'selected' : ''}>Pending</option>
                        <option value="completed" ${task.status === 'completed' ? 'selected' : ''}>Completed</option>
                        <option value="partial" ${task.status === 'partial' ? 'selected' : ''}>Partially Completed</option>
                        <option value="missed" ${task.status === 'missed' ? 'selected' : ''}>Missed</option>
                    </select>
                    <select class="task-project" onchange="updateTask(${index}, null, null, this.value)">
                        <option value="">No Project</option>
                        ${Object.values(data.projects || {}).map(p => `<option value="${p.id}" ${task.projectId === p.id ? 'selected' : ''}>${p.title}</option>`).join('')}
                    </select>
                    <button class="delete-btn" onclick="deleteTask(${index})" title="Delete task">×</button>
                `;
                taskListEl.appendChild(item);
            });
        }

        addTaskBtn.addEventListener('click', () => {
            if (!data[currentDate]) data[currentDate] = [];
            data[currentDate].push({ text: '', status: 'pending' });
            saveData();
            renderTasks();
            setTimeout(() => {
                const inputs = taskListEl.querySelectorAll('.task-input');
                if (inputs.length > 0) inputs[inputs.length - 1].focus();
            }, 50);
        });

        let saveTimeout = null;
        window.updateTask = function (index, text, status, projectId = null) {
            if (text !== null) {
                data[currentDate][index].text = text;
                // Debounce saving text to prevent stutter
                if (saveTimeout) clearTimeout(saveTimeout);
                saveTimeout = setTimeout(saveData, 800);
            }
            if (status !== null) {
                data[currentDate][index].status = status;
                renderTasks();
                saveData(); // Save status immediately
            }
            if (projectId !== null) {
                data[currentDate][index].projectId = projectId;
                saveData();
            }
        }

        window.deleteTask = function (index) {
            data[currentDate].splice(index, 1);
            if (data[currentDate].length === 0) {
                delete data[currentDate];
            }
            saveData();
            renderTasks();
        }

        // Charts Rendering & Logic
        let barChartInstance = null;
        let lineChartInstance = null;

        function getChartColors() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const textColor = isDark ? '#f9fafb' : '#1f2937';
            const gridColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
            return { textColor, gridColor };
        }

        function renderCharts() {
            const { textColor, gridColor } = getChartColors();
            Chart.defaults.font.family = "'Inter', sans-serif";

            const commonOptions = {
                responsive: true,
                maintainAspectRatio: false,
                color: textColor,
                scales: {
                    x: { ticks: { color: textColor }, grid: { display: false } },
                    y: {
                        ticks: { color: textColor, stepSize: 1 },
                        grid: { color: gridColor, borderDash: [5, 5] },
                        beginAtZero: true
                    }
                },
                plugins: {
                    legend: { labels: { color: textColor, font: { weight: '500' } } }
                }
            };

            // Bar Chart (Today/Selected Date)
            if (document.getElementById('today-chart').classList.contains('active')) {
                const tasks = data[currentDate] || [];
                let completed = 0, partial = 0, missed = 0;
                tasks.forEach(t => {
                    if (t.status === 'completed') completed++;
                    else if (t.status === 'partial') partial++;
                    else if (t.status === 'missed') missed++;
                });
                const total = tasks.length;

                const ctxBar = document.getElementById('barChart').getContext('2d');
                if (barChartInstance) barChartInstance.destroy();

                // Add a small delay for animation readiness
                barChartInstance = new Chart(ctxBar, {
                    type: 'bar',
                    data: {
                        labels: ['Total Tasks', 'Completed', 'Partial', 'Missed'],
                        datasets: [{
                            label: `Task Status on ${currentDate}`,
                            data: [total, completed, partial, missed],
                            backgroundColor: [
                                '#6366f1', // Primary
                                '#10b981', // Completed
                                '#f59e0b', // Partial
                                '#ef4444'  // Missed
                            ],
                            borderRadius: 8,
                            borderSkipped: false,
                            barPercentage: 0.6
                        }]
                    },
                    options: {
                        ...commonOptions,
                        plugins: { legend: { display: false } },
                        animation: {
                            y: { duration: 1000, easing: 'easeOutQuart' }
                        }
                    }
                });
            }

            // Projects Analysis Chart
            if (document.getElementById('projects-chart') && document.getElementById('projects-chart').classList.contains('active')) {
                const ctxProj = document.getElementById('projectsBarChart').getContext('2d');
                
                const pKeys = Object.keys(data.projects || {}).sort((a,b) => (data.projects[a].createdAt || 0) - (data.projects[b].createdAt || 0));
                
                const pLabels = [];
                const pStarted = [];
                const pNotStarted = [];
                
                pKeys.forEach(k => {
                     const p = data.projects[k];
                     const name = p.title || 'Project';
                     const start = p.startDate ? p.startDate.substring(5) : '?';
                     const end = p.endDate ? p.endDate.substring(5) : '?';
                     pLabels.push(`${name} (${start} to ${end})`);
                     
                     let st = 0, nst = 0;
                     if(p.tasks) {
                         p.tasks.forEach(t => {
                             if(Math.abs(t.status.indexOf('started')) > -1 && t.status !== 'not_started') st++;
                             else nst++;
                         });
                     }
                     pStarted.push(st);
                     pNotStarted.push(nst);
                });

                if (window.projectsChartInstance) window.projectsChartInstance.destroy();

                if (pKeys.length === 0) {
                     window.projectsChartInstance = new Chart(ctxProj, {
                         type: 'bar',
                         data: { labels: ['No Projects'], datasets: [{ label: 'Started', data: [0], backgroundColor: '#9ca3af', borderRadius: 8 }] },
                         options: { ...commonOptions, plugins: { legend: { display: false } } }
                     });
                } else {
                     window.projectsChartInstance = new Chart(ctxProj, {
                         type: 'bar',
                         data: {
                             labels: pLabels,
                             datasets: [
                                 { label: 'Started', data: pStarted, backgroundColor: '#10b981', borderRadius: 6 },
                                 { label: 'Not Started', data: pNotStarted, backgroundColor: '#6366f1', borderRadius: 6 }
                             ]
                         },
                         options: {
                             ...commonOptions,
                             animation: { y: { duration: 1000, easing: 'easeOutQuart' } }
                         }
                     });
                }
            }

            // Line Chart (Analysis)
            if (document.getElementById('analysis-chart').classList.contains('active')) {
                const range = document.getElementById('analysis-range').value;
                const ctxLine = document.getElementById('lineChart').getContext('2d');

                const labels = [];
                const datasetsData = { total: [], completed: [], partial: [], missed: [] };

                if (range === 'weekly') {
                    // Weekly mode: grouped bar chart showing all available weekly ranges
                    const weekKeys = getAllWeeklyKeys();
                    const weekLabels = [];
                    const totals = [], completeds = [], partials = [], misseds = [];

                    weekKeys.forEach(key => {
                        weekLabels.push(weekKeyToLabel(key));
                        const tasks = data[key] || [];
                        let c = 0, p = 0, m = 0;
                        tasks.forEach(task => {
                            if (task.status === 'completed') c++;
                            else if (task.status === 'partial') p++;
                            else if (task.status === 'missed') m++;
                        });
                        totals.push(tasks.length);
                        completeds.push(c);
                        partials.push(p);
                        misseds.push(m);
                    });

                    if (lineChartInstance) lineChartInstance.destroy();

                    if (weekKeys.length === 0) {
                        // No data — show empty message
                        lineChartInstance = new Chart(ctxLine, {
                            type: 'bar',
                            data: { labels: ['No weekly ranges'], datasets: [{ label: 'No data', data: [0], backgroundColor: '#9ca3af', borderRadius: 8 }] },
                            options: { ...commonOptions, plugins: { legend: { display: false } } }
                        });
                    } else {
                        const weekDatasets = [];
                        if (document.getElementById('chk-total').checked) {
                            weekDatasets.push({ label: 'Total Tasks', data: totals, backgroundColor: '#6366f1', borderRadius: 6 });
                        }
                        if (document.getElementById('chk-comp').checked) {
                            weekDatasets.push({ label: 'Completed', data: completeds, backgroundColor: '#10b981', borderRadius: 6 });
                        }
                        if (document.getElementById('chk-part').checked) {
                            weekDatasets.push({ label: 'Partial', data: partials, backgroundColor: '#f59e0b', borderRadius: 6 });
                        }
                        if (document.getElementById('chk-miss').checked) {
                            weekDatasets.push({ label: 'Missed', data: misseds, backgroundColor: '#ef4444', borderRadius: 6 });
                        }

                        lineChartInstance = new Chart(ctxLine, {
                            type: 'bar',
                            data: {
                                labels: weekLabels,
                                datasets: weekDatasets
                            },
                            options: {
                                ...commonOptions,
                                animation: { y: { duration: 1000, easing: 'easeOutQuart' } }
                            }
                        });
                    }
                    return;
                }

                {
                    const days = range === 'week' ? 7 : (range === 'month' ? 30 : 365);

                    // Construct labels and data array going backwards from selected currentDate
                    const anchorDate = new Date(currentDate + "T00:00:00");
                    for (let i = days - 1; i >= 0; i--) {
                        const d = new Date(anchorDate);
                        d.setDate(anchorDate.getDate() - i);
                        const dStr = getLocalDateString(d);

                        if (range === 'year') {
                            if (d.getDate() === 1) {
                                labels.push(d.toLocaleDateString(undefined, { month: 'short', year: '2-digit' }));
                            } else {
                                labels.push('');
                            }
                        } else {
                            labels.push(d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }));
                        }

                        const tasksDay = data[dStr] || [];
                        let t = tasksDay.length, c = 0, p = 0, m = 0;
                        tasksDay.forEach(task => {
                            if (task.status === 'completed') c++;
                            else if (task.status === 'partial') p++;
                            else if (task.status === 'missed') m++;
                        });
                        datasetsData.total.push(t);
                        datasetsData.completed.push(c);
                        datasetsData.partial.push(p);
                        datasetsData.missed.push(m);
                    }
                }

                if (lineChartInstance) lineChartInstance.destroy();

                const datasets = [];
                if (document.getElementById('chk-total').checked) {
                    datasets.push({
                        label: 'Total Tasks',
                        data: datasetsData.total,
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: range === 'year' ? 0 : 3
                    });
                }
                if (document.getElementById('chk-comp').checked) {
                    datasets.push({
                        label: 'Completed',
                        data: datasetsData.completed,
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: range === 'year' ? 0 : 3
                    });
                }
                if (document.getElementById('chk-part').checked) {
                    datasets.push({
                        label: 'Partial',
                        data: datasetsData.partial,
                        borderColor: '#f59e0b',
                        backgroundColor: 'rgba(245, 158, 11, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: range === 'year' ? 0 : 3
                    });
                }
                if (document.getElementById('chk-miss').checked) {
                    datasets.push({
                        label: 'Missed',
                        data: datasetsData.missed,
                        borderColor: '#ef4444',
                        backgroundColor: 'rgba(239, 68, 68, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: range === 'year' ? 0 : 3
                    });
                }

                lineChartInstance = new Chart(ctxLine, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: datasets
                    },
                    options: {
                        ...commonOptions,
                        interaction: {
                            mode: 'index',
                            intersect: false,
                        },
                        scales: {
                            ...commonOptions.scales,
                            x: {
                                ...commonOptions.scales.x,
                                ticks: {
                                    ...commonOptions.scales.x.ticks,
                                    autoSkip: true,
                                    maxTicksLimit: range === 'year' ? 12 : (range === 'month' ? 10 : 7)
                                }
                            }
                        }
                    }
                });
            }
        }

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
        }

        // Auth UI Wiring
        let isSignUpMode = false;
