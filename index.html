        window.renderProjectsList = function() {
             const grid = document.getElementById('projects-grid');
             grid.innerHTML = '';
             if(!data.projects) data.projects = {};
             
             const pKeys = Object.keys(data.projects).sort((a,b) => data.projects[b].createdAt - data.projects[a].createdAt);
             
             if(pKeys.length === 0){
                 grid.innerHTML = '<div style="color:var(--text-muted); font-size:14px; padding:20px; grid-column: 1 / -1;">No projects created yet. Click "+ New Project" to start.</div>';
                 return;
             }

             pKeys.forEach(k => {
                 const p = data.projects[k];
                 const start = p.startDate || 'No start';
                 const end = p.endDate || 'No end';

                 const tCount = p.tasks ? p.tasks.length : 0;
                 const cCount = p.tasks ? p.tasks.filter(t=>Math.abs(t.status.indexOf('started')) > -1 && t.status !== 'not_started').length : 0; // support old and new
                 const statText = tCount > 0 ? `${cCount}/${tCount} Tasks Started` : 'No tasks';
                 
                 const dRange = `<span style="font-size:13px; color:var(--text-muted); margin-left:8px; font-weight:normal;">(${start} to ${end})</span>`;
                 
                 const pCard = document.createElement('div');
                 pCard.className = 'project-card';
                 let stColor = 'var(--color-pending)';
                 if (p.status === 'completed') stColor = 'var(--color-completed)';
                 if (p.status === 'partial') stColor = 'var(--color-partial)';
                 if (p.status === 'missed') stColor = 'var(--color-missed)';

                 pCard.innerHTML = `
                     <div class="project-card-title">${p.title} ${dRange}</div>
                     <div class="project-card-stats" style="text-transform: capitalize; color: ${stColor}">● ${p.status||'pending'} &middot; <span style="color:var(--text-muted);">${statText}</span></div>
                 `;
                 pCard.onclick = () => openProject(k);
                 grid.appendChild(pCard);
             });
        };

        window.openProject = function(id) {
             activeProjectKey = id;
             const p = data.projects[id];
             document.getElementById('projects-list-container').style.display = 'none';
             document.getElementById('project-detail-container').style.display = 'block';
             
             document.getElementById('project-detail-title').textContent = p.title || "Project";
             document.getElementById('project-notes-input').value = p.notes || "";
             document.getElementById('project-start-date').value = p.startDate || "";
             document.getElementById('project-end-date').value = p.endDate || "";
             document.getElementById('project-global-status').value = p.status || "pending";
             
             renderProjectTasks();
             renderProjectFiles();
        };

        window.renderProjectTasks = function() {
             const list = document.getElementById('project-task-list');
             list.innerHTML = '';
             const p = data.projects[activeProjectKey];
             if(!p.tasks) p.tasks = [];

             let bridgedTasks = [];
             for (const [key, val] of Object.entries(data)) {
                 if (key === 'projects' || key === 'settings' || key === 'tags') continue;
                 if (Array.isArray(val)) {
                     val.forEach((t) => {
                         if (t.projectId === activeProjectKey) {
                             bridgedTasks.push({ text: t.text, status: t.status, source: key.startsWith('week_') ? 'Weekly' : 'Daily' });
                         }
                     });
                 }
             }

             if(p.tasks.length===0 && bridgedTasks.length === 0){
                 list.innerHTML = '<div style="color:var(--text-muted); font-size:13px; font-style:italic; padding:6px 0;">No tasks yet.</div>';
             }

             p.tasks.forEach((t, index) => {
                 const row = document.createElement('div');
                 row.className = 'task-item';
                 row.style.padding = "8px 0";

                 const nameDiv = document.createElement('div');
                 nameDiv.className = 'task-input';
                 nameDiv.style.flex = "1";
                 nameDiv.textContent = t.text;
                 
                 const statusSelect = document.createElement('select');
                 statusSelect.className = 'task-status';
                 statusSelect.innerHTML = `<option value="not_started">Not Started</option><option value="started">Started</option>`;
                 statusSelect.value = t.status || 'not_started';
                 if(t.status === 'started') {
                     statusSelect.style.color = "var(--primary)";
                     statusSelect.style.background = "rgba(99, 102, 241, 0.1)";
                 } else {
                     statusSelect.style.color = "var(--text-muted)";
                     statusSelect.style.background = "transparent";
                     statusSelect.style.border = "1px solid var(--surface-border)";
                 }
                 statusSelect.onchange = (e) => {
                     t.status = e.target.value;
                     if (typeof saveData === 'function') saveData();
                     renderProjectTasks();
                 };

                 const delBtn = document.createElement('div');
                 delBtn.className = 'delete-btn';
                 delBtn.innerHTML = '&times;';
                 delBtn.onclick = (e) => {
                     e.stopPropagation();
                     p.tasks.splice(index, 1);
                     if (typeof saveData === 'function') saveData();
                     renderProjectTasks();
                 };

                 row.appendChild(nameDiv);
                 row.appendChild(statusSelect);
                 row.appendChild(delBtn);
                 list.appendChild(row);
             });

             if(bridgedTasks.length > 0) {
                 const hr = document.createElement('hr');
                 hr.style.border = 'none';
                 hr.style.borderTop = '1px dashed var(--surface-border)';
                 hr.style.margin = '16px 0 8px 0';
                 list.appendChild(hr);
                 
                 const label = document.createElement('div');
                 label.style.fontSize = '12px';
                 label.style.fontWeight = '600';
                 label.style.color = 'var(--text-muted)';
                 label.style.marginBottom = '8px';
                 label.textContent = 'LINKED FROM TODAY / WEEKLY:';
                 list.appendChild(label);

                 bridgedTasks.forEach(t => {
                     const row = document.createElement('div');
                     row.className = 'task-item';
                     row.style.padding = "6px 0";
                     row.innerHTML = `<div style="flex:1; opacity:${t.status==='completed'?'0.6':'1'}; text-decoration:${t.status==='completed'?'line-through':'none'}; pointer-events:none;">${t.text}</div><span style="font-size:11px; padding:2px 6px; background:var(--surface-color); border-radius:4px; color:var(--primary); font-weight:600;">${t.source}</span>`;
                     list.appendChild(row);
                 });
             }
        };

        window.renderAttachments = function(listId, arrClass) {
             const list = document.getElementById(listId);
             list.innerHTML = '';
             const p = data.projects[activeProjectKey];
             if(!p[arrClass]) p[arrClass] = [];
             
             if(p[arrClass].length===0){
                list.innerHTML = '<div style="color:var(--text-muted); font-size:13px; font-style:italic;">No links added.</div>';
                return;
             }

             p[arrClass].forEach((item, idx) => {
                const el = document.createElement('div');
                el.className = 'attachment-item';
                
                const link = document.createElement('a');
                link.href = item.url.startsWith('http') ? item.url : 'https://' + item.url;
                link.target = '_blank';
                let displayUrl = item.url;
                try {
                	let urlObj = new URL(link.href);
                	displayUrl = urlObj.hostname + (urlObj.pathname.length>1?'...':'');
                } catch(e){}
                link.textContent = displayUrl;

                const del = document.createElement('span');
                del.innerHTML = '&times;';
                del.style.cursor = 'pointer';
                del.style.color = 'var(--color-missed)';
                del.style.fontWeight = 'bold';
                del.onclick = () => {
                    p[arrClass].splice(idx, 1);
                    if (typeof saveData === 'function') saveData();
                    renderAttachments(listId, arrClass);
                };

                el.appendChild(link);
                el.appendChild(del);
                list.appendChild(el);
             });
        };

        window.renderProjectFiles = function()  { renderAttachments('project-files-list', 'files'); };

        // ===== CUSTOM DATE PICKER =====
        (function() {
            const overlay = document.createElement('div');
            overlay.className = 'cdp-overlay';
            overlay.innerHTML = `
                <div class="cdp-calendar">
                    <div class="cdp-header">
                        <button id="cdp-prev">‹</button>
                        <span class="cdp-month-year" id="cdp-month-year"></span>
                        <button id="cdp-next">›</button>
                    </div>
                    <div class="cdp-weekdays">
                        <span>Mo</span><span>Tu</span><span>We</span><span>Th</span><span>Fr</span><span>Sa</span><span>Su</span>
                    </div>
                    <div class="cdp-days" id="cdp-days"></div>
                    <button class="cdp-today-btn" id="cdp-today">Today</button>
                </div>
            `;
            document.body.appendChild(overlay);

            let activeInput = null;
            let viewYear, viewMonth;

            const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

            function render() {
                document.getElementById('cdp-month-year').textContent = `${monthNames[viewMonth]} ${viewYear}`;
                const daysEl = document.getElementById('cdp-days');
                daysEl.innerHTML = '';

                const firstDay = new Date(viewYear, viewMonth, 1);
                let startDay = firstDay.getDay();
                startDay = startDay === 0 ? 6 : startDay - 1; // Monday start

                const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
                const daysInPrev = new Date(viewYear, viewMonth, 0).getDate();

                const today = new Date();
                const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
                const selectedStr = activeInput ? activeInput.value : '';

                // Previous month
                for (let i = startDay - 1; i >= 0; i--) {
                    const d = daysInPrev - i;
                    const btn = document.createElement('button');
                    btn.className = 'cdp-day other-month';
                    btn.textContent = d;
                    const m = viewMonth === 0 ? 12 : viewMonth;
                    const y = viewMonth === 0 ? viewYear - 1 : viewYear;
                    btn.dataset.date = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    daysEl.appendChild(btn);
                }

                // Current month
                for (let d = 1; d <= daysInMonth; d++) {
                    const btn = document.createElement('button');
                    const dateStr = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    btn.className = 'cdp-day';
                    if (dateStr === todayStr) btn.classList.add('today');
                    if (dateStr === selectedStr) btn.classList.add('selected');
                    btn.textContent = d;
                    btn.dataset.date = dateStr;
                    daysEl.appendChild(btn);
                }

                // Next month fill
                const totalCells = startDay + daysInMonth;
                const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
                for (let d = 1; d <= remaining; d++) {
                    const btn = document.createElement('button');
                    btn.className = 'cdp-day other-month';
                    btn.textContent = d;
                    const m = viewMonth === 11 ? 1 : viewMonth + 2;
                    const y = viewMonth === 11 ? viewYear + 1 : viewYear;
                    btn.dataset.date = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                    daysEl.appendChild(btn);
                }
            }

            function openPicker(input) {
                activeInput = input;
                const current = input.value ? new Date(input.value + 'T00:00:00') : new Date();
                viewYear = current.getFullYear();
                viewMonth = current.getMonth();
                render();
                overlay.classList.add('open');
            }

            function closePicker() {
                overlay.classList.remove('open');
                activeInput = null;
            }

            function selectDate(dateStr) {
                if (activeInput) {
                    activeInput.value = dateStr;
                    activeInput.dispatchEvent(new Event('change', { bubbles: true }));
                }
                closePicker();
            }

            // Intercept clicks on date inputs
            document.addEventListener('click', (e) => {
                const inp = e.target.closest('input[type="date"]');
                if (inp) {
                    e.preventDefault();
                    openPicker(inp);
                    return;
                }
            });

            // Prevent native picker from opening
            document.addEventListener('mousedown', (e) => {
                if (e.target.closest('input[type="date"]')) {
                    e.preventDefault();
                }
            });

            // Calendar button clicks
            document.getElementById('cdp-prev').addEventListener('click', () => {
                viewMonth--;
                if (viewMonth < 0) { viewMonth = 11; viewYear--; }
                render();
            });

            document.getElementById('cdp-next').addEventListener('click', () => {
                viewMonth++;
                if (viewMonth > 11) { viewMonth = 0; viewYear++; }
                render();
            });

            document.getElementById('cdp-today').addEventListener('click', () => {
                const t = new Date();
                selectDate(`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`);
            });

            document.getElementById('cdp-days').addEventListener('click', (e) => {
                if (e.target.classList.contains('cdp-day') && e.target.dataset.date) {
                    selectDate(e.target.dataset.date);
                }
            });

            // Click outside to close
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) closePicker();
            });

            // Escape to close
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && overlay.classList.contains('open')) closePicker();
            });
        })();

    </script>

    <script>
    // Force-clear ALL old caches and re-register service worker
    if ('serviceWorker' in navigator) {
        // Step 1: Unregister ALL existing service workers
        navigator.serviceWorker.getRegistrations().then(registrations => {
            registrations.forEach(reg => reg.unregister());
        });
        // Step 2: Nuke ALL caches
        if ('caches' in window) {
            caches.keys().then(names => {
                names.forEach(name => caches.delete(name));
            });
        }
        // Step 3: Re-register fresh service worker after a short delay
        setTimeout(() => {
            navigator.serviceWorker.register('sw.js?v=4').then(() => {
                console.log('Fresh SW registered');
            });
        }, 1000);
    }
    </script>
