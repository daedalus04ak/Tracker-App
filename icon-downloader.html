<html>

<body style="font-family: sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh;">
    <h2>Generating your PNG Icon...</h2>
    <p>Check your browser downloads!</p>
    <script>
        window.onload = () => {
            const svgCode = `<svg width="512" height="512" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="40" height="40" rx="10" fill="#2563eb"/>
                <g transform="translate(-28, -6) scale(1.6)">
                    <!-- Carbon Floor -->

                    <path d="M10.5 16 L20 12 L29.5 16" stroke="#94a3b8" stroke-width="1.2"/>
                    <path d="M10.5 17 L20 18 L29.5 17" stroke="#94a3b8" stroke-width="1.2"/>
                    <path d="M10.5 15 L20 15 L29.5 15" stroke="#cbd5e1" stroke-width="0.8"/>
                    <rect x="6" y="5" width="28" height="4" rx="1" fill="#e2e8f0"/>
                    <path d="M20 5 L7 8 L7 9 L20 7 L33 9 L33 8 Z" fill="#94a3b8"/>
                    <path d="M5 4 L7 4 L8 10 L6 10 Z" fill="white"/><path d="M35 4 L33 4 L32 10 L34 10 Z" fill="white"/>
                    <path d="M20 3.5 L17 15 L16 19 L20 20 L24 19 L23 15 Z" fill="white"/>
                    <circle cx="20" cy="4.5" r="0.8" fill="#1e293b"/>
                    <path d="M16 19 C 10 19, 10 26, 15 31 C 17 33, 19 35, 20 37 L20 19 Z" fill="white"/>
                    <path d="M24 19 C 30 19, 30 26, 25 31 C 23 33, 21 35, 20 37 L20 19 Z" fill="white"/>
                    <rect x="12" y="18.5" width="4" height="2.5" rx="0.5" fill="#0f172a"/>
                    <rect x="24" y="18.5" width="4" height="2.5" rx="0.5" fill="#0f172a"/>
                    <path d="M26 23 l2 0 M26.5 25 l1.5 0 M26 27 l1.5 0" stroke="#94a3b8" stroke-width="0.8"/>
                    <path d="M14 23 l-2 0 M13.5 25 l-1.5 0 M14 27 l-1.5 0" stroke="#94a3b8" stroke-width="0.8"/>
                    <path d="M16 23 C 16 19, 24 19, 24 23 L22.5 31 L17.5 31 Z" fill="#0f172a"/>
                    <circle cx="20" cy="24" r="2.2" fill="#ef4444"/>
                    <path d="M18.5 23.5 Q 20 21.5 21.5 23.5" stroke="#1e293b" stroke-width="1.2" fill="none"/>
                    <path d="M20 20 C 14 20, 15 25, 17 25 L16.5 26 C 14.5 26, 13 20, 20 19 C 27 20, 25.5 26, 23.5 26 L23 25 C 25 25, 26 20, 20 20 Z" fill="#e2e8f0"/>
                    <line x1="20" y1="20" x2="20" y2="23" stroke="#e2e8f0" stroke-width="1"/>

                    <path d="M19.5 21 L20.5 21 L20.5 35 L19.5 35 Z" fill="#cbd5e1"/>

                    <rect x="6.5" y="27" width="0.5" height="11" fill="#334155"/><rect x="8" y="27" width="0.5" height="11" fill="#334155"/><rect x="9.5" y="27" width="0.5" height="11" fill="#334155"/>
                    <rect x="29.5" y="27" width="0.5" height="11" fill="#334155"/><rect x="31" y="27" width="0.5" height="11" fill="#334155"/><rect x="32.5" y="27" width="0.5" height="11" fill="#334155"/>
                    <rect x="12" y="31.5" width="2" height="2" fill="#cbd5e1"/><rect x="26" y="31.5" width="2" height="2" fill="#cbd5e1"/>
                    <path d="M12 30 L20 29 L28 30" stroke="#94a3b8" stroke-width="1"/>

                    <path d="M15 36.5 L25 36.5 L26 38 L14 38 Z" fill="#0f172a"/>
                    <circle cx="20" cy="35" r="1.5" fill="#1e293b"/><circle cx="20" cy="35" r="0.8" fill="#fb923c"/>
                    <rect x="11" y="36" width="18" height="2.5" rx="0.5" fill="white"/>
                    <rect x="11" y="34.5" width="18" height="1" fill="#cbd5e1"/>
                    <path d="M10 33 L11 33 L11 39 L9.5 39 Z" fill="white"/><path d="M30 33 L29 33 L29 39 L30.5 39 Z" fill="white"/>
                    <rect x="18.5" y="35" width="1" height="2.5" fill="#94a3b8"/><rect x="20.5" y="35" width="1" height="2.5" fill="#94a3b8"/>
                </g>
            </svg>`;
            
            const encoded = btoa(unescape(encodeURIComponent(svgCode)));
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            const img = new Image();
            img.onload = () => {
                ctx.drawImage(img, 0, 0, 512, 512);
                const a = document.createElement('a');
                a.download = 'icon.png';
                a.href = canvas.toDataURL('image/png');
                a.click();
            };
            img.src = 'data:image/svg+xml;base64,' + encoded;
        };
    </script>
</body>
</html>
